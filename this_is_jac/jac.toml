[project]
name = "this-is-jac"
version = "1.0.0"
description = "This is Jac - a scroll-driven showcase of Jac's fullstack, object-spatial, AI-native, and native-compilation capabilities"
entry-point = "main.jac"

[jacpack]
name = "this-is-jac"
description = "This is Jac showcase site template"

[jac-shadcn]
style = "nova"
baseColor = "zinc"
theme = "orange"
font = "figtree"
radius = "large"
menuAccent = "subtle"
menuColor = "default"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[dependencies.npm]
"@fontsource-variable/figtree" = "*"
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"
shadcn = "^3.8.5"
clsx = "^2.1.1"
tailwind-merge = "^3.5.0"
tw-animate-css = "^1.4.0"
radix-ui = "*"
class-variance-authority = "*"
"@hugeicons/react" = "*"
"@hugeicons/core-free-icons" = "*"
lucide-react = "^0.469.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[serve]
base_route_app = "app"

[plugins.client.app_meta_data]
title = "This is Jac"
description = "One language for the graph, the server, the browser, and the metal. A live tour of Jac."
keywords = "jac jaseci fullstack object-spatial walkers native wasm byllm"
author = "Jaseci Labs"
theme_color = "#f97316"
icon = "/static/assets/jac-logo.svg"
